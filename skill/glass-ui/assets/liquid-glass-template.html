<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
          "Segoe UI", system-ui, sans-serif;
      }
      #glcanvas {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      /* The glass slab is drawn by the shader BEHIND this div.
         The div itself has no background; it only holds content. */
      #card {
        position: absolute;
        width: clamp(300px, 29vw, 375px);
        padding: 26px 24px 22px;
        z-index: 6;
        border-radius: 34px;
        color: var(--ink, #fff);
        cursor: grab;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #card.dragging { cursor: grabbing; }
      #card:focus-visible {
        outline: 2px solid rgba(var(--ink-rgb, 255, 255, 255), 0.9);
        outline-offset: 4px;
      }
      #card h1 {
        margin: 0 0 6px;
        font-size: 28px;
        font-weight: 800;
        text-align: center;
      }
      #card p {
        margin: 0 0 16px;
        font-size: 14px;
        line-height: 1.4;
        text-align: center;
        font-weight: 600;
        opacity: 0.95;
      }

      /* Inner glass elements: flat translucent layers, never nested backdrop-filter */
      .tile-row { display: flex; gap: 10px; }
      .tile {
        flex: 1;
        border-radius: 15px;
        padding: 12px 4px 10px;
        text-align: center;
        border: 1px solid rgba(var(--ink-rgb, 255, 255, 255), 0.45);
        background: rgba(var(--ink-rgb, 255, 255, 255), 0.07);
      }
      .tile .num { font-size: 21px; font-weight: 800; }
      .tile .lbl { font-size: 12px; font-weight: 700; opacity: 0.92; margin-top: 2px; }

      @media (max-width: 720px) {
        #card {
          position: relative !important;
          left: auto !important;
          top: auto !important;
          width: min(88vw, 340px);
          margin: 24px auto 0;
          cursor: default;
        }
        body { display: flex; justify-content: center; }
      }
    </style>
  </head>
  <body>
    <img id="srcImage" style="display: none" crossorigin="anonymous" alt="" aria-hidden="true" />
    <canvas id="glcanvas" aria-hidden="true"></canvas>

    <div id="card">
      <h1>Liquid Glass</h1>
      <p>Replace this content with anything. The glass follows the div.</p>
      <div class="tile-row">
        <div class="tile"><div class="num">A</div><div class="lbl">First</div></div>
        <div class="tile"><div class="num">B</div><div class="lbl">Second</div></div>
        <div class="tile"><div class="num">C</div><div class="lbl">Third</div></div>
      </div>
    </div>

    <script id="fragShader" type="x-shader/x-fragment">
      precision mediump float;

      uniform vec3 iResolution;
      uniform vec2 uImgRes;
      uniform vec2 uCardPos;   // card centre in gl pixels (y up)
      uniform vec2 uCardHalf;  // half width / half height in pixels
      uniform float uWhite;    // 0..1 whiteness (keep <= 0.16)
      uniform sampler2D iChannel0;

      // cover-fit the backdrop image to the viewport
      vec2 coverUv(vec2 uv) {
        float ca = iResolution.x / iResolution.y;
        float ia = uImgRes.x / uImgRes.y;
        vec2 s = ca > ia ? vec2(1.0, ia / ca) : vec2(ca / ia, 1.0);
        return (uv - 0.5) * s + 0.5;
      }

      void main() {
        // superellipse exponent: higher = squarer corners
        const float POWER_EXPONENT = 6.0;
        vec2 fragCoord = gl_FragCoord.xy;
        vec2 uv = fragCoord / iResolution.xy;

        vec2 d = (fragCoord - uCardPos) / uCardHalf;
        float roundedBox = pow(abs(d.x), POWER_EXPONENT) + pow(abs(d.y), POWER_EXPONENT);

        // rb1: soft interior mask, rb2: thin bright rim at the edge, rb3: outer falloff band
        float rb1 = clamp((1.0 - roundedBox) * 8.0, 0.0, 1.0);
        float rb2 = clamp((0.955 - roundedBox * 0.95) * 16.0, 0.0, 1.0) -
                    clamp((0.91  - roundedBox * 0.95) * 16.0, 0.0, 1.0);
        float rb3 = clamp((1.5 - roundedBox * 1.1) * 2.0, 0.0, 1.0) -
                    clamp((1.0 - roundedBox * 1.1) * 2.0, 0.0, 1.0);

        vec4 bg = texture2D(iChannel0, coverUv(uv));
        float transition = smoothstep(0.0, 1.0, rb1 + rb2);
        vec4 color = bg;

        if (transition > 0.0) {
          vec2 cuv = uCardPos / iResolution.xy;
          // lens refraction: pull edge samples toward the centre (0.22 = lens strength)
          vec2 lens = cuv + (uv - cuv) * (1.0 - roundedBox * 0.22);

          // 9x9 box blur = frosting (1.2 = blur spread)
          vec4 acc = vec4(0.0);
          float total = 0.0;
          for (float x = -4.0; x <= 4.0; x++) {
            for (float y = -4.0; y <= 4.0; y++) {
              vec2 off = vec2(x, y) * 1.2 / iResolution.xy;
              acc += texture2D(iChannel0, coverUv(lens + off));
              total += 1.0;
            }
          }
          acc /= total;

          // vertical light gradient + bright rim (0.3 = rim brightness)
          float dy = uv.y - cuv.y;
          float gradient = clamp((clamp(dy, 0.0, 0.2) + 0.1) / 2.0, 0.0, 1.0) +
                           clamp((clamp(-dy, -1000.0, 0.2) * rb3 + 0.1) / 2.0, 0.0, 1.0);
          vec4 lighting = clamp(acc + vec4(rb1) * gradient + vec4(rb2) * 0.3, 0.0, 1.0);

          lighting = mix(lighting, vec4(1.0), uWhite * 0.97);
          color = mix(bg, lighting, transition);
        }
        gl_FragColor = vec4(color.rgb, 1.0);
      }
    </script>

    <script>
      /* =================== WebGL setup =================== */
      const canvas = document.getElementById("glcanvas");
      // preserveDrawingBuffer is required if you ever export the canvas to PNG
      const gl = canvas.getContext("webgl", { preserveDrawingBuffer: true });
      const img = document.getElementById("srcImage");
      const card = document.getElementById("card");

      function setCanvasSize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      setCanvasSize();

      const vsSource = `attribute vec2 position; void main(){ gl_Position = vec4(position, 0.0, 1.0); }`;
      const fsSource = document.getElementById("fragShader").textContent;

      function createShader(type, source) {
        const sh = gl.createShader(type);
        gl.shaderSource(sh, source);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
          console.error("Shader error:", gl.getShaderInfoLog(sh));
          gl.deleteShader(sh);
          return null;
        }
        return sh;
      }
      const program = gl.createProgram();
      gl.attachShader(program, createShader(gl.VERTEX_SHADER, vsSource));
      gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fsSource));
      gl.linkProgram(program);
      gl.useProgram(program);

      const buffer = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.bufferData(
        gl.ARRAY_BUFFER,
        new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
        gl.STATIC_DRAW,
      );
      const positionLoc = gl.getAttribLocation(program, "position");
      gl.enableVertexAttribArray(positionLoc);
      gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);

      const U = {
        resolution: gl.getUniformLocation(program, "iResolution"),
        imgRes: gl.getUniformLocation(program, "uImgRes"),
        cardPos: gl.getUniformLocation(program, "uCardPos"),
        cardHalf: gl.getUniformLocation(program, "uCardHalf"),
        white: gl.getUniformLocation(program, "uWhite"),
        texture: gl.getUniformLocation(program, "iChannel0"),
      };

      const texture = gl.createTexture();
      let imgW = 1600,
        imgH = 1000;

      function uploadTexture(source, w, h) {
        imgW = w;
        imgH = h;
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, source);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      }

      /* Procedural gradient-mesh fallback backdrop. Glass needs a visually
         rich backdrop to read as glass; replace via loadBackground() below. */
      function proceduralBackground() {
        const c = document.createElement("canvas");
        c.width = 1600;
        c.height = 1000;
        const x = c.getContext("2d");
        const base = x.createLinearGradient(0, 0, 1600, 1000);
        base.addColorStop(0, "#1b2a6b");
        base.addColorStop(0.5, "#7048a8");
        base.addColorStop(1, "#d4527e");
        x.fillStyle = base;
        x.fillRect(0, 0, 1600, 1000);
        const blobs = [
          [300, 250, 420, "#ff8f5c"],
          [1250, 300, 380, "#46c2ff"],
          [800, 800, 460, "#ffd166"],
          [1450, 850, 320, "#7bf1a8"],
        ];
        for (const [bx, by, r, col] of blobs) {
          const g = x.createRadialGradient(bx, by, 0, bx, by, r);
          g.addColorStop(0, col + "cc");
          g.addColorStop(1, col + "00");
          x.fillStyle = g;
          x.fillRect(0, 0, 1600, 1000);
        }
        uploadTexture(c, 1600, 1000);
      }
      proceduralBackground();

      /* Glass only looks premium over a RICH backdrop (photo or detailed art).
         Default below is a CORS-enabled photo; swap in the user's image first.
         The procedural gradient above is only the offline fallback. */
      function loadBackground(urls, i = 0) {
        if (i >= urls.length) return;
        img.onload = () => {
          try {
            uploadTexture(img, img.naturalWidth, img.naturalHeight);
          } catch (e) {
            proceduralBackground();
          }
        };
        img.onerror = () => loadBackground(urls, i + 1);
        img.src = urls[i];
      }
      loadBackground([
        "https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1920&q=80",
        "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=1920&q=80",
        "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920&q=80",
      ]);

      /* =================== Ink colour =================== */
      let whiteness = 0; // 0..0.16, fades glass toward white
      let inkRGB = [255, 255, 255];
      card.style.setProperty("--ink", `rgb(${inkRGB.join(",")})`);
      card.style.setProperty("--ink-rgb", inkRGB.join(","));

      /* =================== Draggable card =================== */
      function placeCardInitial() {
        if (window.innerWidth <= 720) return; // CSS flow handles mobile
        const w = card.offsetWidth,
          h = card.offsetHeight;
        card.style.left = Math.max(20, (window.innerWidth - w) / 2) + "px";
        card.style.top = Math.max(16, (window.innerHeight - h) / 2) + "px";
      }
      let drag = null;
      const isMobile = () => window.innerWidth <= 720;
      card.addEventListener("pointerdown", (e) => {
        if (isMobile()) return;
        if (e.target.closest("a, button, canvas, input")) return;
        drag = { dx: e.clientX - card.offsetLeft, dy: e.clientY - card.offsetTop };
        card.setPointerCapture(e.pointerId);
        card.classList.add("dragging");
      });
      card.addEventListener("pointermove", (e) => {
        if (!drag) return;
        const w = card.offsetWidth,
          h = card.offsetHeight;
        let nx = e.clientX - drag.dx,
          ny = e.clientY - drag.dy;
        nx = Math.min(Math.max(nx, 8), window.innerWidth - w - 8);
        ny = Math.min(Math.max(ny, 8), window.innerHeight - h - 8);
        card.style.left = nx + "px";
        card.style.top = ny + "px";
      });
      card.addEventListener("pointerup", () => {
        drag = null;
        card.classList.remove("dragging");
      });

      /* =================== Render loop =================== */
      let rafId = null;
      function render() {
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = canvas.height - (rect.top + rect.height / 2); // gl y is flipped

        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.uniform3f(U.resolution, canvas.width, canvas.height, 1.0);
        gl.uniform2f(U.imgRes, imgW, imgH);
        gl.uniform2f(U.cardPos, cx, cy);
        gl.uniform2f(U.cardHalf, rect.width / 2 + 4, rect.height / 2 + 4);
        gl.uniform1f(U.white, whiteness);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.uniform1i(U.texture, 0);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        rafId = requestAnimationFrame(render);
      }

      // Pause the shader loop while the tab is hidden (battery / GPU)
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          cancelAnimationFrame(rafId);
        } else {
          rafId = requestAnimationFrame(render);
        }
      });

      window.addEventListener("resize", () => {
        setCanvasSize();
        if (window.innerWidth > 720) {
          const w = card.offsetWidth,
            h = card.offsetHeight;
          card.style.left =
            Math.min(Math.max(card.offsetLeft, 8), Math.max(8, window.innerWidth - w - 8)) + "px";
          card.style.top =
            Math.min(Math.max(card.offsetTop, 8), Math.max(8, window.innerHeight - h - 8)) + "px";
        }
      });

      /* init */
      placeCardInitial();
      render();
    </script>
  </body>
</html>
